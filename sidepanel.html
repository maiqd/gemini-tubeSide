<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini TubeSide</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sidepanel">
    <div class="actions">
      <select id="theme-selector" class="theme-select">
        <option value="default">YouTube Native (Dark)</option>
        <option value="theme-light">Crisp Light</option>
        <option value="theme-paper">Reading Paper (Sepia)</option>
        <option value="theme-blue">Soft Blue</option>
      </select>
      <button id="smart-summary" class="btn" interestfor="smart-summary-hint">Smart Summary</button>
      <p id="smart-summary-hint" popover="hint">Generate a concise summary of the current video</p>
      <button id="key-takeaways" class="btn" interestfor="key-takeaways-hint">Key Takeaways</button>
      <p id="key-takeaways-hint" popover="hint">Extract the main points and lessons</p>
    </div>
    <div id="output" class="output" hidden></div>
  </div>
  <script src="sidepanel.bundle.js"></script>
</body>
</html>
