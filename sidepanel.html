<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini TubeSide</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sidepanel">
    <div class="typography-controls">
      <select id="font-selector" class="theme-select">
        <option value="system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, sans-serif">Modern (Sans)</option>
        <option value="Georgia, &quot;Times New Roman&quot;, serif">Reading (Serif)</option>
        <option value="ui-monospace, &quot;Cascadia Code&quot;, Menlo, Consolas, monospace">Code (Mono)</option>
        <option value="&quot;Comic Sans MS&quot;, &quot;Chalkboard SE&quot;, sans-serif">Accessible</option>
      </select>
      <button id="btn-text-decrease" class="btn">A-</button>
      <button id="btn-text-increase" class="btn">A+</button>
    </div>
    <div class="actions">
      <select id="theme-selector" class="theme-select">
        <option value="default">YouTube Native (Dark)</option>
        <option value="theme-light">Crisp Light</option>
        <option value="theme-paper">Reading Paper (Sepia)</option>
        <option value="theme-blue">Soft Blue</option>
      </select>
      <button id="smart-summary" class="btn" interestfor="smart-summary-hint">Smart Summary</button>
      <p id="smart-summary-hint" popover="hint">Generate a concise summary of the current video</p>
      <button id="key-takeaways" class="btn" interestfor="key-takeaways-hint">Key Takeaways</button>
      <p id="key-takeaways-hint" popover="hint">Extract the main points and lessons</p>
    </div>
    <div class="output-wrapper">
      <button type="button" id="request-again" class="btn-request-again" hidden>Request again</button>
      <div id="output" class="output" hidden></div>
    </div>
    <div id="loading" class="loading" hidden>
      <div class="spinner"></div>
      <p id="loading-message">Analyzing video...</p>
    </div>
  </div>
  <script src="sidepanel.bundle.js"></script>
</body>
</html>
